<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viz8</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--body-bg);
    color: var(--body-text);
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    min-height: 100vh;
    padding: 16px 20px;
    overflow: hidden;
    transition: background 0.2s, color 0.2s;
  }
  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--body-text);
    margin-right: 8px;
  }
  .header-desc {
    font-size: 11px;
    color: var(--muted-text);
    margin-right: auto;
  }
  .filter-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--subtle-text);
    font-size: 10px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--hover-bg); }
  .filter-btn.active { border-color: var(--gc); color: var(--gc); background: color-mix(in srgb, var(--gc) 8%, transparent); }
  .filter-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gc);
  }
  /* ── Theme toggle ── */
  .theme-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--subtle-text);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 4px;
  }
  .theme-toggle:hover { background: var(--hover-bg); color: var(--body-text); }
  /* ── Canvas container ── */
  .canvas-wrap {
    overflow: hidden;
    border-radius: 8px;
    border: 1px solid var(--canvas-border);
    position: relative;
    height: calc(100vh - 120px);
    transition: border-color 0.2s;
  }
  svg { display: block; width: 100%; height: 100%; cursor: grab; }
  svg:active { cursor: grabbing; }
  /* ── Zoom controls ── */
  .zoom-ctrl {
    position: absolute;
    bottom: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 10px;
    color: var(--muted-text);
    backdrop-filter: blur(8px);
    transition: all 0.2s;
  }
  .zoom-ctrl button {
    background: none;
    border: 1px solid var(--border);
    color: var(--subtle-text);
    font-family: inherit;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .zoom-ctrl button:hover { background: var(--hover-bg); color: var(--body-text); }
  /* ── Legend ── */
  .legend {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
    padding: 0 4px;
    font-size: 10px;
    color: var(--legend-text);
    transition: color 0.2s;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  /* ── Info panel ── */
  .info-panel {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    max-width: 300px;
    font-size: 11px;
    color: var(--info-text);
    backdrop-filter: blur(8px);
    pointer-events: none;
    transition: all 0.2s;
  }
  .info-panel-title { font-weight: 600; color: var(--body-text); margin-bottom: 4px; font-size: 12px; }
  .info-panel-group { font-size: 10px; margin-bottom: 6px; }
  .info-panel-desc { color: var(--subtle-text); line-height: 1.5; }
</style>
</head>
<body>
<script>
(function() {
  'use strict';

  // ── Data injection ──
  const DATA = __DATA__;

  // ── Theme definitions ──
  const themes = {
    dark: {
      // CSS custom properties
      bodyBg: '#06090f',
      bodyText: '#e2e8f0',
      mutedText: '#64748b',
      subtleText: '#94a3b8',
      panelBg: '#0c1220cc',
      border: '#1e293b',
      canvasBorder: '#0f1e2e',
      hoverBg: '#0f1724',
      legendText: '#475569',
      infoText: '#cbd5e1',
      // SVG colors
      svgBg: '#07090e',
      dotFill: '#1e293b',
      dotOpacity: 0.5,
      cardBg: '#0c1220',
      cardText: '#e2e8f0',
      itemText: '#6b8ab0',
      itemDesc: '#3b5068',
      itemDivider: '#111827',
      edgeLabelBg: '#07090e',
      edgeLabelText: '#64748b',
      // Group color adjustments
      headerFillAlpha: '18',
      badgeAlpha: '28',
      zoneAlpha: '06',
      zoneStrokeAlpha: '15',
      // Icon
      icon: '\u263E',
    },
    light: {
      bodyBg: '#f1f5f9',
      bodyText: '#1e293b',
      mutedText: '#64748b',
      subtleText: '#475569',
      panelBg: '#ffffffcc',
      border: '#cbd5e1',
      canvasBorder: '#e2e8f0',
      hoverBg: '#e2e8f0',
      legendText: '#64748b',
      infoText: '#475569',
      svgBg: '#f8fafc',
      dotFill: '#94a3b8',
      dotOpacity: 0.2,
      cardBg: '#ffffff',
      cardText: '#1e293b',
      itemText: '#475569',
      itemDesc: '#94a3b8',
      itemDivider: '#e2e8f0',
      edgeLabelBg: '#f8fafc',
      edgeLabelText: '#64748b',
      headerFillAlpha: '20',
      badgeAlpha: '25',
      zoneAlpha: '08',
      zoneStrokeAlpha: '18',
      icon: '\u2600',
    }
  };

  let currentTheme = 'dark';
  function T() { return themes[currentTheme]; }

  function applyCSSVars() {
    const t = T();
    const s = document.documentElement.style;
    s.setProperty('--body-bg', t.bodyBg);
    s.setProperty('--body-text', t.bodyText);
    s.setProperty('--muted-text', t.mutedText);
    s.setProperty('--subtle-text', t.subtleText);
    s.setProperty('--panel-bg', t.panelBg);
    s.setProperty('--border', t.border);
    s.setProperty('--canvas-border', t.canvasBorder);
    s.setProperty('--hover-bg', t.hoverBg);
    s.setProperty('--legend-text', t.legendText);
    s.setProperty('--info-text', t.infoText);
  }

  // ── Constants ──
  const COL_WIDTH = 280;
  const COL_GAP = 80;
  const HEADER_H = 36;
  const ROW_H = 22;
  const TABLE_GAP = 24;
  const PAD_TOP = 80;
  const PAD_LEFT = 40;
  const DIM_OPACITY = 0.12;
  const MIN_ZOOM = 0.3;
  const MAX_ZOOM = 3;

  // ── Helpers ──
  const groupColorMap = {};
  for (const g of DATA.groups) groupColorMap[g.id] = g.color;
  function gc(groupId) { return groupColorMap[groupId] || '#6b7280'; }

  function svgEl(tag, attrs, children) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    if (attrs) for (const [k, v] of Object.entries(attrs)) {
      if (v !== undefined && v !== null) el.setAttribute(k, String(v));
    }
    if (children) {
      if (typeof children === 'string') el.textContent = children;
      else for (const c of children) { if (c) el.appendChild(c); }
    }
    return el;
  }

  function htmlEl(tag, attrs, children) {
    const el = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === 'style' && typeof v === 'object') Object.assign(el.style, v);
        else if (k === 'className') el.className = v;
        else el.setAttribute(k, String(v));
      }
    }
    if (children) {
      if (typeof children === 'string') el.textContent = children;
      else for (const c of children) {
        if (typeof c === 'string') el.appendChild(document.createTextNode(c));
        else if (c) el.appendChild(c);
      }
    }
    return el;
  }

  // ── Layout engine ──
  const ROW_GAP = 60; // vertical gap between group rows in vstack mode

  function computeLayout(mode) {
    const groupOrder = DATA.groups.map(g => g.id);
    const byGroup = new Map();
    for (const gid of groupOrder) byGroup.set(gid, []);
    for (const comp of DATA.components) {
      const list = byGroup.get(comp.group);
      if (list) list.push(comp);
    }

    if (mode === 'vstack') return computeLayoutVStack(groupOrder, byGroup);
    return computeLayoutHStack(groupOrder, byGroup);
  }

  function computeLayoutHStack(groupOrder, byGroup) {
    const layouts = [];
    let maxBottom = 0;

    for (let colIdx = 0; colIdx < groupOrder.length; colIdx++) {
      const gid = groupOrder[colIdx];
      const comps = byGroup.get(gid) || [];
      const x = PAD_LEFT + colIdx * (COL_WIDTH + COL_GAP);
      let y = PAD_TOP;

      for (const comp of comps) {
        const itemCount = comp.items ? comp.items.length : 0;
        const h = HEADER_H + itemCount * ROW_H + 8;
        layouts.push({ comp, x, y, width: COL_WIDTH, height: h });
        y += h + TABLE_GAP;
      }
      if (y > maxBottom) maxBottom = y;
    }

    const totalW = PAD_LEFT + groupOrder.length * COL_WIDTH + (groupOrder.length - 1) * COL_GAP + PAD_LEFT;
    const totalH = maxBottom + 40;
    return { layouts, width: totalW, height: totalH };
  }

  function computeLayoutVStack(groupOrder, byGroup) {
    const layouts = [];
    let y = PAD_TOP;

    for (let rowIdx = 0; rowIdx < groupOrder.length; rowIdx++) {
      const gid = groupOrder[rowIdx];
      const comps = byGroup.get(gid) || [];
      if (comps.length === 0) continue;

      let x = PAD_LEFT;
      let maxH = 0;

      for (const comp of comps) {
        const itemCount = comp.items ? comp.items.length : 0;
        const h = HEADER_H + itemCount * ROW_H + 8;
        layouts.push({ comp, x, y, width: COL_WIDTH, height: h });
        x += COL_WIDTH + COL_GAP;
        if (h > maxH) maxH = h;
      }
      y += maxH + ROW_GAP;
    }

    // Compute total width from max right edge
    let maxRight = 0;
    for (const lt of layouts) {
      const r = lt.x + lt.width;
      if (r > maxRight) maxRight = r;
    }

    const totalW = maxRight + PAD_LEFT;
    const totalH = y + 40;
    return { layouts, width: totalW, height: totalH };
  }

  // ── Edge computation ──
  function computeEdges(layouts) {
    const compMap = new Map();
    for (const lt of layouts) compMap.set(lt.comp.id, lt);

    return (DATA.connections || []).map(conn => {
      const from = compMap.get(conn.from);
      const to = compMap.get(conn.to);
      if (!from || !to) return null;

      const fromCX = from.x + from.width / 2;
      const fromCY = from.y + from.height / 2;
      const toCX = to.x + to.width / 2;
      const toCY = to.y + to.height / 2;
      const dx = Math.abs(toCX - fromCX);
      const dy = Math.abs(toCY - fromCY);

      let x1, y1, x2, y2;
      if (dx >= dy) {
        x1 = toCX > fromCX ? from.x + from.width : from.x;
        x2 = toCX > fromCX ? to.x : to.x + to.width;
        y1 = fromCY;
        y2 = toCY;
      } else {
        y1 = toCY > fromCY ? from.y + from.height : from.y;
        y2 = toCY > fromCY ? to.y : to.y + to.height;
        x1 = fromCX;
        x2 = toCX;
      }

      return { conn, x1, y1, x2, y2, fromId: conn.from, toId: conn.to, fromGroup: from.comp.group };
    }).filter(Boolean);
  }

  function edgeControlPoints(e) {
    const dx = Math.abs(e.x2 - e.x1);
    const dy = Math.abs(e.y2 - e.y1);
    if (dx >= dy) {
      const cp = Math.max(dx * 0.45, 50);
      const sx = e.x2 > e.x1 ? 1 : -1;
      return { cx1: e.x1 + sx * cp, cy1: e.y1, cx2: e.x2 - sx * cp, cy2: e.y2 };
    }
    const cp = Math.max(dy * 0.45, 30);
    const sy = e.y2 > e.y1 ? 1 : -1;
    return { cx1: e.x1, cy1: e.y1 + sy * cp, cx2: e.x2, cy2: e.y2 - sy * cp };
  }

  function edgePath(e) {
    const { cx1, cy1, cx2, cy2 } = edgeControlPoints(e);
    return `M${e.x1},${e.y1} C${cx1},${cy1} ${cx2},${cy2} ${e.x2},${e.y2}`;
  }

  function edgeLabelPos(e) {
    const { cx1, cy1, cx2, cy2 } = edgeControlPoints(e);
    const x = (e.x1 + 3 * cx1 + 3 * cx2 + e.x2) / 8;
    const y = (e.y1 + 3 * cy1 + 3 * cy2 + e.y2) / 8;
    return { x, y };
  }

  const DASH_ARRAYS = { dashed: '6,4', dotted: '2,3' };
  function dashArray(style) { return DASH_ARRAYS[style]; }

  // ── State ──
  let layoutMode = 'hstack'; // 'hstack' | 'vstack'
  let layout = computeLayout(layoutMode);
  let selectedComp = null;
  let activeGroups = new Set();
  let view = { x: 0, y: 0, w: layout.width, h: layout.height };
  let isPanning = false;
  let didDrag = false;
  let panStart = { x: 0, y: 0, vx: 0, vy: 0 };

  // ── Rendering ──
  function getVisibleLayouts() {
    if (activeGroups.size === 0) return layout.layouts;
    return layout.layouts.filter(lt => activeGroups.has(lt.comp.group));
  }

  function getRelatedComps() {
    if (!selectedComp) return new Set();
    const set = new Set([selectedComp]);
    for (const c of DATA.connections || []) {
      if (c.from === selectedComp) set.add(c.to);
      if (c.to === selectedComp) set.add(c.from);
    }
    return set;
  }

  function render() {
    const t = T();
    const svg = document.getElementById('canvas');
    svg.setAttribute('viewBox', `${view.x} ${view.y} ${view.w} ${view.h}`);

    while (svg.firstChild) svg.removeChild(svg.firstChild);

    const visible = getVisibleLayouts();
    const edges = computeEdges(visible);
    const related = getRelatedComps();

    // Defs
    const defs = svgEl('defs', {}, [
      (() => {
        const p = svgEl('pattern', { id: 'dots', width: 20, height: 20, patternUnits: 'userSpaceOnUse' });
        p.appendChild(svgEl('circle', { cx: 1, cy: 1, r: 0.5, fill: t.dotFill, opacity: t.dotOpacity }));
        return p;
      })(),
      ...DATA.groups.map(g => {
        const m = svgEl('marker', {
          id: `arr-${g.id}`, viewBox: '0 0 10 10',
          refX: 10, refY: 5, markerWidth: 6, markerHeight: 6, orient: 'auto-start-reverse'
        });
        m.appendChild(svgEl('path', { d: 'M0,2 L10,5 L0,8', fill: g.color, opacity: 0.6 }));
        return m;
      })
    ]);
    svg.appendChild(defs);

    // Background
    svg.appendChild(svgEl('rect', { x: -5000, y: -5000, width: 15000, height: 15000, fill: t.svgBg }));
    svg.appendChild(svgEl('rect', { x: -5000, y: -5000, width: 15000, height: 15000, fill: 'url(#dots)' }));

    // Group zones
    const zones = new Map();
    for (const lt of visible) {
      const gid = lt.comp.group;
      const z = zones.get(gid);
      if (z) {
        z.minX = Math.min(z.minX, lt.x);
        z.minY = Math.min(z.minY, lt.y);
        z.maxX = Math.max(z.maxX, lt.x + lt.width);
        z.maxY = Math.max(z.maxY, lt.y + lt.height);
      } else {
        zones.set(gid, { minX: lt.x, minY: lt.y, maxX: lt.x + lt.width, maxY: lt.y + lt.height });
      }
    }
    for (const [gid, z] of zones) {
      const color = gc(gid);
      const dimmed = activeGroups.size > 0 && !activeGroups.has(gid);
      svg.appendChild(svgEl('rect', {
        x: z.minX - 12, y: z.minY - 16,
        width: z.maxX - z.minX + 24, height: z.maxY - z.minY + 32,
        rx: 10, fill: color + t.zoneAlpha, stroke: color + t.zoneStrokeAlpha, 'stroke-width': 1,
        opacity: dimmed ? 0.3 : 1,
        style: 'transition: opacity 0.15s'
      }));
    }

    // Group headers
    for (const [gid, z] of zones) {
      const group = DATA.groups.find(g => g.id === gid);
      if (!group) continue;
      const color = gc(gid);
      svg.appendChild(svgEl('text', {
        x: z.minX + (z.maxX - z.minX) / 2,
        y: z.minY - 24,
        'text-anchor': 'middle',
        fill: color,
        'font-size': 11,
        'font-weight': 600,
        'font-family': "'JetBrains Mono', 'Fira Code', monospace",
        opacity: 0.7
      }, group.label));
    }

    // Edges
    for (const e of edges) {
      const isFocused = selectedComp !== null && (e.fromId === selectedComp || e.toId === selectedComp);
      const isVisible = selectedComp === null || isFocused;
      const color = gc(e.fromGroup);
      const da = dashArray(e.conn.style);

      const path = svgEl('path', {
        d: edgePath(e),
        fill: 'none',
        stroke: color,
        'stroke-width': isFocused ? 1.8 : 0.9,
        'stroke-opacity': isVisible ? (isFocused ? 0.85 : 0.22) : 0.04,
        'stroke-dasharray': da,
        'marker-end': `url(#arr-${e.fromGroup})`,
        style: 'transition: stroke-opacity 0.15s, stroke-width 0.15s'
      });
      svg.appendChild(path);

      if (e.conn.label) {
        const pos = edgeLabelPos(e);
        const labelG = svgEl('g', { opacity: isVisible ? (isFocused ? 0.9 : 0.35) : 0.05, style: 'transition: opacity 0.15s' });
        labelG.appendChild(svgEl('rect', {
          x: pos.x - 40, y: pos.y - 7,
          width: 80, height: 14,
          rx: 3, fill: t.edgeLabelBg, opacity: 0.85
        }));
        labelG.appendChild(svgEl('text', {
          x: pos.x, y: pos.y + 3,
          'text-anchor': 'middle',
          fill: t.edgeLabelText,
          'font-size': 7.5,
          'font-family': "'JetBrains Mono', 'Fira Code', monospace"
        }, e.conn.label));
        svg.appendChild(labelG);
      }
    }

    // Component boxes
    for (const lt of visible) {
      const comp = lt.comp;
      const color = gc(comp.group);
      const isDim = (selectedComp !== null && !related.has(comp.id)) ||
                    (activeGroups.size > 0 && !activeGroups.has(comp.group));
      const isSel = selectedComp === comp.id;

      const g = svgEl('g', {
        'data-comp': comp.id,
        opacity: isDim ? DIM_OPACITY : 1,
        style: 'cursor: pointer; transition: opacity 0.15s'
      });

      if (isSel) {
        g.appendChild(svgEl('rect', {
          x: lt.x - 3, y: lt.y - 3,
          width: lt.width + 6, height: lt.height + 6,
          rx: 9, fill: color, opacity: 0.1
        }));
      }

      g.appendChild(svgEl('rect', {
        x: lt.x, y: lt.y, width: lt.width, height: lt.height,
        rx: 6, fill: t.cardBg,
        stroke: color,
        'stroke-width': isSel ? 1.5 : 0.75,
        'stroke-opacity': isSel ? 0.9 : 0.3
      }));

      g.appendChild(svgEl('rect', {
        x: lt.x, y: lt.y, width: lt.width, height: HEADER_H,
        rx: 6, fill: color + t.headerFillAlpha
      }));
      g.appendChild(svgEl('rect', {
        x: lt.x, y: lt.y + HEADER_H - 5, width: lt.width, height: 5,
        fill: color + t.headerFillAlpha
      }));
      g.appendChild(svgEl('line', {
        x1: lt.x, y1: lt.y + HEADER_H,
        x2: lt.x + lt.width, y2: lt.y + HEADER_H,
        stroke: color, 'stroke-width': 0.5, 'stroke-opacity': 0.25
      }));

      g.appendChild(svgEl('rect', {
        x: lt.x + 6, y: lt.y + 8, width: 22, height: 14,
        rx: 3, fill: color + t.badgeAlpha
      }));
      g.appendChild(svgEl('text', {
        x: lt.x + 17, y: lt.y + 18.5,
        'text-anchor': 'middle',
        fill: color, 'font-size': 7.5, 'font-weight': 800,
        'font-family': 'monospace', 'letter-spacing': '0.02em'
      }, comp.group));

      g.appendChild(svgEl('text', {
        x: lt.x + 34, y: lt.y + 21,
        fill: t.cardText, 'font-size': 10.5, 'font-weight': 600,
        'font-family': 'monospace', 'letter-spacing': '-0.01em'
      }, comp.label));

      if (comp.items) {
        for (let i = 0; i < comp.items.length; i++) {
          const item = comp.items[i];
          const cy = lt.y + HEADER_H + i * ROW_H;

          if (i > 0) {
            g.appendChild(svgEl('line', {
              x1: lt.x + 6, y1: cy,
              x2: lt.x + lt.width - 6, y2: cy,
              stroke: t.itemDivider, 'stroke-width': 0.6
            }));
          }

          g.appendChild(svgEl('rect', {
            x: lt.x + 7, y: cy + 5, width: 4, height: 10,
            rx: 1.5, fill: color, opacity: 0.4
          }));

          g.appendChild(svgEl('text', {
            x: lt.x + 15, y: cy + 14.5,
            fill: t.itemText, 'font-size': 8.5,
            'font-family': 'monospace'
          }, item.label));

          if (item.description) {
            g.appendChild(svgEl('text', {
              x: lt.x + lt.width - 8, y: cy + 14.5,
              'text-anchor': 'end',
              fill: t.itemDesc, 'font-size': 7.5,
              'font-family': 'monospace'
            }, item.description));
          }
        }
      }

      g.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (didDrag) return;
        selectedComp = selectedComp === comp.id ? null : comp.id;
        renderAll({ header: false, legend: false });
      });

      svg.appendChild(g);
    }
  }

  // ── Info panel ──
  function renderInfoPanel() {
    let panel = document.getElementById('info-panel');
    if (panel) panel.remove();

    if (!selectedComp) return;

    const comp = DATA.components.find(c => c.id === selectedComp);
    if (!comp) return;
    const group = DATA.groups.find(g => g.id === comp.group);

    panel = htmlEl('div', { id: 'info-panel', className: 'info-panel' }, [
      htmlEl('div', { className: 'info-panel-title' }, comp.label),
      group ? htmlEl('div', { className: 'info-panel-group', style: { color: gc(comp.group) } }, group.label) : null,
      comp.description ? htmlEl('div', { className: 'info-panel-desc' }, comp.description) : null
    ]);
    document.querySelector('.canvas-wrap').appendChild(panel);
  }

  // ── Header ──
  function renderHeader() {
    const header = htmlEl('div', { className: 'header' });
    header.appendChild(htmlEl('span', { className: 'header-title' }, DATA.title || 'viz8'));
    if (DATA.description) {
      header.appendChild(htmlEl('span', { className: 'header-desc' }, DATA.description));
    }

    for (const g of DATA.groups) {
      const btn = htmlEl('button', { className: 'filter-btn' + (activeGroups.has(g.id) ? ' active' : '') });
      btn.style.setProperty('--gc', g.color);
      btn.appendChild(htmlEl('span', { className: 'filter-dot' }));
      btn.appendChild(document.createTextNode(g.label));
      btn.addEventListener('click', () => {
        if (activeGroups.has(g.id)) activeGroups.delete(g.id);
        else activeGroups.add(g.id);
        renderAll({ legend: false });
      });
      header.appendChild(btn);
    }

    // Layout toggle button
    const layoutIcon = layoutMode === 'hstack' ? '\u2503' : '\u2501'; // ┃ or ━
    const layoutTitle = layoutMode === 'hstack' ? 'Switch to vertical layout' : 'Switch to horizontal layout';
    const layoutBtn = htmlEl('button', { className: 'theme-toggle', title: layoutTitle }, layoutIcon);
    layoutBtn.addEventListener('click', () => {
      layoutMode = layoutMode === 'hstack' ? 'vstack' : 'hstack';
      reLayout();
    });
    header.appendChild(layoutBtn);

    // Theme toggle button
    const themeBtn = htmlEl('button', { className: 'theme-toggle' }, T().icon);
    themeBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      applyCSSVars();
      renderAll();
    });
    header.appendChild(themeBtn);

    const existing = document.querySelector('.header');
    if (existing) existing.replaceWith(header);
    else document.body.prepend(header);
  }

  // ── Legend ──
  function renderLegend() {
    const existing = document.querySelector('.legend');
    if (existing) existing.remove();

    const legend = htmlEl('div', { className: 'legend' });
    const styles = [
      { label: 'solid', dash: undefined },
      { label: 'dashed', dash: DASH_ARRAYS.dashed },
      { label: 'dotted', dash: DASH_ARRAYS.dotted }
    ];
    for (const s of styles) {
      const item = htmlEl('div', { className: 'legend-item' });
      const lineSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      lineSvg.setAttribute('width', '24');
      lineSvg.setAttribute('height', '2');
      lineSvg.setAttribute('viewBox', '0 0 24 2');
      const line = svgEl('line', {
        x1: 0, y1: 1, x2: 24, y2: 1,
        stroke: T().legendText, 'stroke-width': 1.5,
        'stroke-dasharray': s.dash
      });
      lineSvg.appendChild(line);
      item.appendChild(lineSvg);
      item.appendChild(htmlEl('span', {}, s.label));
      legend.appendChild(item);
    }
    document.body.appendChild(legend);
  }

  // ── Zoom / Pan ──
  let cachedZoomPct = null;

  function updateViewBox() {
    const svg = document.getElementById('canvas');
    svg.setAttribute('viewBox', `${view.x} ${view.y} ${view.w} ${view.h}`);
    if (!cachedZoomPct) cachedZoomPct = document.getElementById('zoom-pct');
    if (cachedZoomPct) {
      const pct = Math.round((layout.width / view.w) * 100);
      cachedZoomPct.textContent = pct + '%';
    }
  }

  function setupZoomPan() {
    const svg = document.getElementById('canvas');

    svg.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const mx = (e.clientX - rect.left) / rect.width;
      const my = (e.clientY - rect.top) / rect.height;
      const factor = e.deltaY > 0 ? 1.08 : 1 / 1.08;

      const newW = Math.min(layout.width / MIN_ZOOM, Math.max(layout.width / MAX_ZOOM, view.w * factor));
      const newH = Math.min(layout.height / MIN_ZOOM, Math.max(layout.height / MAX_ZOOM, view.h * factor));
      view.x = view.x + (view.w - newW) * mx;
      view.y = view.y + (view.h - newH) * my;
      view.w = newW;
      view.h = newH;
      updateViewBox();
    }, { passive: false });

    let panRect = null;

    svg.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isPanning = true;
      didDrag = false;
      panRect = svg.getBoundingClientRect();
      panStart = { x: e.clientX, y: e.clientY, vx: view.x, vy: view.y };
    });

    svg.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      const movedX = Math.abs(e.clientX - panStart.x);
      const movedY = Math.abs(e.clientY - panStart.y);
      if (movedX > 4 || movedY > 4) didDrag = true;

      const rect = panRect;
      const dx = ((e.clientX - panStart.x) / rect.width) * view.w;
      const dy = ((e.clientY - panStart.y) / rect.height) * view.h;
      view.x = panStart.vx - dx;
      view.y = panStart.vy - dy;
      updateViewBox();
    });

    const endPan = () => { isPanning = false; };
    svg.addEventListener('mouseup', endPan);
    svg.addEventListener('mouseleave', endPan);

    svg.addEventListener('click', (e) => {
      if (didDrag) return;
      if (!e.target.closest('[data-comp]')) {
        selectedComp = null;
        renderAll({ header: false, legend: false });
      }
    });
  }

  // ── Zoom controls ──
  function renderZoomControls() {
    const ctrl = htmlEl('div', { className: 'zoom-ctrl' });
    ctrl.appendChild(htmlEl('span', { id: 'zoom-pct' }, '100%'));
    const resetBtn = htmlEl('button', {}, 'Reset');
    resetBtn.addEventListener('click', () => {
      view = { x: 0, y: 0, w: layout.width, h: layout.height };
      updateViewBox();
    });
    ctrl.appendChild(resetBtn);
    document.querySelector('.canvas-wrap').appendChild(ctrl);
  }

  function renderAll(opts) {
    const o = opts || {};
    if (o.header !== false) renderHeader();
    render();
    renderInfoPanel();
    if (o.legend !== false) renderLegend();
  }

  // ── Re-layout (called on mode switch) ──
  function reLayout() {
    layout = computeLayout(layoutMode);
    view = { x: 0, y: 0, w: layout.width, h: layout.height };
    renderAll();
    updateViewBox();
  }

  // ── Init ──
  function init() {
    applyCSSVars();
    renderHeader();

    const wrap = htmlEl('div', { className: 'canvas-wrap' });
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.id = 'canvas';
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '100%');
    svg.setAttribute('viewBox', `0 0 ${layout.width} ${layout.height}`);
    wrap.appendChild(svg);
    document.body.appendChild(wrap);

    renderZoomControls();
    renderLegend();
    setupZoomPan();
    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
